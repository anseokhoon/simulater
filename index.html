<script>
function formatMoney(manWon) {
  if (manWon === 0) return '0원';
  if (manWon < 0) return '-' + formatMoney(Math.abs(manWon));
  const uk = Math.floor(manWon / 10000);
  const man = Math.round(manWon % 10000);
  let res = '';
  if (uk > 0) res += uk.toLocaleString() + '억 ';
  if (man > 0) res += man.toLocaleString() + '만 ';
  return res.trim() + '원';
}

  { id:1, cat_id:1, type:'article', title:'세금의 일생 개요', summary:'세금은 태어나서 사망할 때까지 경제활동의 전 과정에서 발생한다. 소득·재산·소비·이전의 각 단계별로 다양한 세금이 부과된다.', keywords:['세금의 일생','소득세','재산세','소비세','취득세','상속세','증여세'], page:4, law:'', content:`<h2>세금의 일생</h2><h3>소득 단계</h3><ul><li>근로소득 → 근로소득세</li><li>사업소득 → 종합소득세</li><li>금융소득 → 이자소득세·배당소득세</li><li>연금소득 → 연금소득세</li></ul><h3>재산 취득·보유·처분 단계</h3><ul><li>취득 → 취득세, 등록면허세</li><li>보유 → 재산세, 종합부동산세</li><li>처분(양도) → 양도소득세</li></ul><h3>이전 단계</h3><ul><li>사망에 의한 이전 → 상속세</li><li>생전 무상 이전 → 증여세</li></ul><h3>소비 단계</h3><ul><li>재화·용역 구매 → 부가가치세</li><li>특별소비재 → 개별소비세, 주세</li></ul>` },
  { id:2, cat_id:1, type:'article', title:'조세의 분류', summary:'세금은 부과 주체(국세·지방세), 전가 여부(직접세·간접세), 목적(보통세·목적세)에 따라 분류된다.', keywords:['국세','지방세','직접세','간접세','보통세','목적세'], page:5, law:'', content:`<h2>조세의 분류</h2><h3>부과 주체별</h3><table><tr><th>구분</th><th>내용</th><th>예시</th></tr><tr><td><strong>국세</strong></td><td>국가가 부과·징수</td><td>소득세, 법인세, 상속세, 증여세, 부가가치세</td></tr><tr><td><strong>지방세</strong></td><td>지방자치단체 부과</td><td>재산세, 취득세, 주민세</td></tr></table><h3>전가 가능성별</h3><table><tr><th>구분</th><th>내용</th><th>예시</th></tr><tr><td><strong>직접세</strong></td><td>납세의무자 = 담세자</td><td>소득세, 법인세, 상속세, 증여세</td></tr><tr><td><strong>간접세</strong></td><td>납세의무자 ≠ 담세자</td><td>부가가치세, 개별소비세</td></tr></table>` },
  { id:3, cat_id:1, type:'article', title:'소득세 특징과 세율체계', summary:'소득세는 개인 단위로 과세되며, 6%~45%의 8단계 초과누진세율이 적용된다.', keywords:['소득세율','초과누진세율','과세표준','6%','45%'], page:13, law:'소득세법 제55조', content:`<h2>소득세 세율표 (2026년)</h2><table><tr><th>과세표준</th><th>세율</th><th>누진공제액</th></tr><tr><td>1,400만원 이하</td><td>6%</td><td>—</td></tr><tr><td>1,400만원 초과 ~ 5,000만원 이하</td><td>15%</td><td>126만원</td></tr><tr><td>5,000만원 초과 ~ 8,800만원 이하</td><td>24%</td><td>576만원</td></tr><tr><td>8,800만원 초과 ~ 1억5,000만원 이하</td><td>35%</td><td>1,544만원</td></tr><tr><td>1억5,000만원 초과 ~ 3억원 이하</td><td>38%</td><td>1,994만원</td></tr><tr><td>3억원 초과 ~ 5억원 이하</td><td>40%</td><td>2,594만원</td></tr><tr><td>5억원 초과 ~ 10억원 이하</td><td>42%</td><td>3,594만원</td></tr><tr><td>10억원 초과</td><td>45%</td><td>6,594만원</td></tr></table><blockquote>산출세액 = 과세표준 × 세율 − 누진공제액<br>예) 6,000만원 × 24% − 576만원 = <strong>864만원</strong></blockquote>` },
  { id:4, cat_id:1, type:'article', title:'상속·증여세 세율표', summary:'상속·증여세는 10%~50%의 5단계 초과누진세율이 적용된다.', keywords:['상속세율','증여세율','10%','50%'], page:11, law:'상속세 및 증여세법 제26조, 제56조', content:`<h2>상속·증여세 세율표</h2><table><tr><th>과세표준</th><th>세율</th><th>누진공제액</th></tr><tr><td>1억원 이하</td><td>10%</td><td>—</td></tr><tr><td>1억원 초과 ~ 5억원 이하</td><td>20%</td><td>1,000만원</td></tr><tr><td>5억원 초과 ~ 10억원 이하</td><td>30%</td><td>6,000만원</td></tr><tr><td>10억원 초과 ~ 30억원 이하</td><td>40%</td><td>1억6,000만원</td></tr><tr><td>30억원 초과</td><td>50%</td><td>4억6,000만원</td></tr></table><blockquote>예) 과세표준 10억원 → 10억원 × 40% − 1억6,000만원 = <strong>2억4,000만원</strong></blockquote>` },
  { id:5, cat_id:31, type:'article', title:'저축성보험 보험차익 비과세 요건', summary:'월적립식은 5년 이상 납입·10년 이상 유지·월 150만원 이하, 일시납은 1억원 이하·10년 이상 유지 시 이자소득세 비과세.', keywords:['보험차익','비과세','10년','5년','150만원','1억원','저축성보험'], page:20, law:'소득세법 제16조, 시행령 제25조', content:`<h2>저축성보험 보험차익 비과세</h2><h3>월적립식 저축성보험</h3><table><tr><th>요건</th><th>내용</th></tr><tr><td>납입기간</td><td><strong>5년 이상</strong> 납입</td></tr><tr><td>유지기간</td><td><strong>10년 이상</strong> 유지</td></tr><tr><td>월 보험료</td><td><strong>150만원 이하</strong></td></tr></table><h3>일시납 저축성보험</h3><table><tr><th>요건</th><th>내용</th></tr><tr><td>납입한도</td><td>1인당 <strong>1억원 이하</strong></td></tr><tr><td>유지기간</td><td><strong>10년 이상</strong> 유지</td></tr></table><blockquote>⚠️ 1억원 초과 일시납은 10년 유지해도 비과세 불가</blockquote><h3>비과세 배제 사유</h3><ul><li>최초 납입일로부터 10년 미만 중도해지</li><li>월 보험료 150만원 초과</li><li>보험계약 대출 이용 시</li></ul>` },
  { id:12, cat_id:52, type:'article', title:'연금계좌 세액공제 (연금저축·IRP)', summary:'연금저축 600만원·IRP 포함 합산 900만원 한도로 13.2%~16.5% 세액공제. 총급여 5,500만원 이하는 16.5% 적용.', keywords:['연금저축','IRP','세액공제','900만원','16.5%','13.2%'], page:36, law:'소득세법 제59조의3', content:`<h2>연금계좌 세액공제</h2><table><tr><th>구분</th><th>연금저축</th><th>IRP 포함 합산</th></tr><tr><td>납입 한도</td><td>연 600만원</td><td>연 <strong>900만원</strong></td></tr></table><h3>세액공제율</h3><table><tr><th>총급여(근로자)</th><th>공제율</th><th>최대 공제액</th></tr><tr><td>5,500만원 이하</td><td><strong>16.5%</strong></td><td>148.5만원</td></tr><tr><td>5,500만원 초과</td><td><strong>13.2%</strong></td><td>118.8만원</td></tr></table><blockquote>운용 기간 중 이자·배당 등 운용소득은 <strong>과세 없음</strong> (인출 시 과세)</blockquote>` },
  { id:13, cat_id:52, type:'article', title:'사적연금 수령 시 과세세율', summary:'사적연금 연금 수령 시 나이에 따라 3%~5% 저율 분리과세. 연금수령한도 초과 인출 시 기타소득(16.5%) 과세.', keywords:['사적연금','연금소득세율','5%','4%','3%','연금수령한도','70세','80세'], page:37, law:'소득세법 제129조 제1항 제8호', content:`<h2>사적연금 수령 시 과세</h2><table><tr><th>수령 연령</th><th>세율</th></tr><tr><td>70세 미만</td><td><strong>5%</strong></td></tr><tr><td>70세 이상 ~ 80세 미만</td><td><strong>4%</strong></td></tr><tr><td>80세 이상</td><td><strong>3%</strong></td></tr></table><h3>연금수령한도 계산식</h3><blockquote><strong>연금수령한도 = 연금계좌 평가액 ÷ (11 − 연금수령 연차) × 120%</strong></blockquote><p>예) 평가액 1억원, 1년차: 1억 ÷ 10 × 120% = <strong>1,200만원</strong></p><table><tr><th>구분</th><th>수령 방법</th><th>세율</th></tr><tr><td>한도 이내 연금 수령</td><td>연금 형태</td><td><strong>3~5%</strong></td></tr><tr><td>한도 초과 인출</td><td>일시금·해지</td><td><strong>16.5%</strong></td></tr></table>` },
  { id:14, cat_id:61, type:'article', title:'증여세 계산 구조 및 공제', summary:'증여세는 증여재산가액에서 공제 차감 후 10%~50% 세율 적용. 10년 합산 배주자 6억, 성년 자녀 5천만 공제.', keywords:['증여세','증여재산공제','10%','50%','3%','신고세액공제','3개월'], page:40, law:'상속세 및 증여세법 제53조, 제56조', content:`<h2>증여세 계산 구조</h2><pre>증여재산가액<br>  − 채무액 (부담부증여)<br>= 증여세 과세가액<br>  + 10년 내 동일인 증여 합산<br>  − 증여재산공제<br>= 과세표준<br>  × 세율 (10%~50%)<br>= 산출세액<br>  − 신고세액공제 (3%)<br>= 납부세액</pre><h3>증여재산공제 (10년 합산)</h3><table><tr><th>증여자</th><th>공제 한도</th></tr><tr><td>배우자</td><td><strong>6억원</strong></td></tr><tr><td>직계존속 (성년)</td><td><strong>5,000만원</strong></td></tr><tr><td>직계존속 (미성년)</td><td><strong>2,000만원</strong></td></tr><tr><td>직계비속</td><td><strong>5,000만원</strong></td></tr><tr><td>기타 친족</td><td><strong>1,000만원</strong></td></tr></table><blockquote>혼인·출산 공제: 혼인 전후 2년 또는 출산 후 2년 이내 <strong>1억원</strong> 추가 공제</blockquote><p><strong>신고기한</strong>: 증여일이 속한 달의 말일로부터 <strong>3개월</strong> 이내</p>` },
  { id:15, cat_id:71, type:'article', title:'상속세 계산 구조 및 상속인 순위', summary:'상속세는 상속재산에서 공제를 차감하고 10%~50% 세율 적용. 상속인 1순위는 직계비속+배우자.', keywords:['상속세','간주상속재산','상속인 순위','법정상속비율','6개월'], page:46, law:'상속세 및 증여세법 제1조~제27조', content:`<h2>상속세 계산 구조</h2><pre>본래 상속재산<br>  + 간주상속재산 (보험금, 신탁재산, 퇴직금)<br>  + 사전증여재산 (10년/5년 내)<br>= 총 상속재산가액<br>  − 공과금·장례비용·채무<br>= 상속세 과세가액<br>  − 상속공제 (일괄, 배우자 등)<br>= 과세표준<br>  × 세율 (10%~50%)<br>= 산출세액<br>  − 신고세액공제 (3%)<br>= 납부세액</pre><h3>상속인 순위</h3><ol><li>직계비속 (자녀, 손자녀) + 배우자</li><li>직계존속 (부모, 조부모) + 배우자</li><li>형제자매</li><li>4촌 이내 방계혈족</li></ol><h3>법정상속비율</h3><ul><li>배우자 상속분: 다른 상속인의 <strong>1.5배</strong></li><li>예) 배우자 + 자녀 2인: 배우자 3/7, 자녀 각 2/7</li></ul>` }
];

const QA_ITEMS = [
  { id:101, cat_id:41, type:'qa', title:'이자소득세는 언제 납부하나요?', summary:'지급 시점에 금융기관이 원천징수. 2,000만원 초과 시 종합소득세 신고.', keywords:['이자소득세','원천징수','분리과세','2000만원'], page:2, law:'소득세법 제14조, 제129조', question:'이자소득세는 언제 납부하나요?', answer:`이자소득세는 이자를 지급하는 금융기관이 지급 시점에 <strong>원천징수</strong>합니다.<br><br>연간 이자+배당 합계가 <strong>2,000만원 이하</strong>라면 원천징수로 납세가 완료됩니다(분리과세).<br><br><strong>2,000만원을 초과</strong>하는 경우에는 다음 해 5월에 종합소득세로 신고·납부해야 합니다.` },
  { id:102, cat_id:31, type:'qa', title:'저축성보험 비과세 조건', summary:'월적립식 5년납 10년유지 150만원 이하. 일시납 1억 이하 10년유지.', keywords:['저축성보험','비과세','5년','10년','150만원','1억원'], page:20, law:'소득세법 제16조', question:'저축성보험 보험차익이 비과세되려면 어떤 조건이 필요한가요?', answer:`<strong>월적립식</strong>: ① 5년 이상 납입 ② 10년 이상 유지 ③ 월 보험료 150만원 이하<br><br><strong>일시납</strong>: ① 1인당 1억원 이하 납입 ② 10년 이상 유지<br><br>⚠️ 1억원 초과 일시납은 10년 유지해도 비과세 불가` },
  { id:106, cat_id:52, type:'qa', title:'사적연금 수령 시 세금', summary:'연금 형태 수령 시 3~5% 분리과세. 한도 초과 인출 시 16.5% 과세.', keywords:['사적연금','연금소득세','5%','4%','3%'], page:37, law:'소득세법 제129조', question:'사적연금을 수령할 때 세금은 얼마나 내나요?', answer:`연금 형태로 수령하면 낮은 세율의 <strong>연금소득세</strong>가 부과됩니다.<br><br>• 70세 미만: <strong>5%</strong><br>• 70세 이상 ~ 80세 미만: <strong>4%</strong><br>• 80세 이상: <strong>3%</strong><br><br>⚠️ 연금수령한도를 초과하여 인출하면 <strong>기타소득(16.5%)</strong>으로 과세됩니다.` },
  { id:107, cat_id:61, type:'qa', title:'부모가 자녀에게 비과세로 줄 수 있는 금액', summary:'성년 자녀 10년간 5천만원. 혼인·출산 시 1억원 추가 공제.', keywords:['증여재산공제','5000만원','혼인공제','1억원'], page:43, law:'상증법 제53조', question:'부모가 자녀에게 세금 없이 줄 수 있는 최대 금액은 얼마인가요?', answer:`<strong>10년 단위</strong> 증여재산공제:<br>• 성년 자녀: <strong>5,000만원</strong><br>• 미성년 자녀: <strong>2,000만원</strong><br><br>혼인 전후 2년 또는 출산 후 2년 이내 증여 시 <strong>1억원 추가</strong> 공제<br><br>→ 혼인하는 성년 자녀: 5,000만원 + 1억원 = <strong>1억5,000만원</strong>` },

const getMainCatId = (catId) => catId <= 9 ? catId : (CAT_MAP[catId] || catId);

function renderCats() {
  const parents = CATEGORIES.filter(c => c.parent_id === null);
  catGrid.innerHTML = parents.map(c => {
    const cnt = ALL_DATA.filter(d => getMainCatId(d.cat_id) === c.id).length;
    const isSel = filterCat === c.id;
    return `
      <div onclick="toggleCat(${c.id})" class="flex flex-col items-center justify-center p-3 sm:p-4 rounded-2xl cursor-pointer transition-all duration-200 border-2 ${isSel ? 'border-primary-500 bg-primary-50 shadow-md transform scale-[0.98]' : 'border-transparent bg-white shadow-sm hover:shadow-md hover:border-primary-100'}">
        <span class="text-2xl sm:text-3xl mb-1.5 transition-transform ${isSel ? 'scale-110' : ''}">${c.emoji}</span>
        <div class="text-[0.65rem] sm:text-xs font-bold text-center leading-tight ${isSel ? 'text-primary-800' : 'text-slate-700'}">${c.name}</div>
        <div class="text-[0.6rem] sm:text-[0.65rem] mt-1 ${isSel ? 'text-primary-500' : 'text-slate-400'}">${cnt}개</div>
      </div>
    `;
  }).join('');

  if (filterCat) {
    const subs = CATEGORIES.filter(c => c.parent_id === filterCat);
    if (subs.length > 0) {
      subCatArea.classList.remove('hidden');
      subCatArea.innerHTML = subs.map(s => {
        const cnt = ALL_DATA.filter(d => d.cat_id === s.id).length;
        const isSel = filterSubCat === s.id;
        return `
          <button onclick="toggleSubCat(${s.id})" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border transition-colors ${isSel ? 'bg-primary-50 border-primary-300 text-primary-700 shadow-sm' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}">

          </button>
        `;
      }).join('');
    } else {
      subCatArea.classList.add('hidden');
    }
  } else {
    subCatArea.classList.add('hidden');
    filterSubCat = null;
  }

function toggleCat(id) {
  if (filterCat === id) { filterCat = null; filterSubCat = null; } 
  else { filterCat = id; filterSubCat = null; }
  renderCats(); renderList();
}
function toggleSubCat(id) {
  filterSubCat = filterSubCat === id ? null : id;
  renderCats(); renderList();
}
function setFilter(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active', 'bg-slate-800', 'text-white', 'shadow-md');
    b.classList.add('bg-white', 'text-slate-600');
  });
  btn.classList.remove('bg-white', 'text-slate-600');
  btn.classList.add('active', 'bg-slate-800', 'text-white', 'shadow-md');

  const catNames = ['조세일반','보험','금융소득','연금','증여세','상속세'];
  if (catNames.some(n => type.includes(n))) {
    filterType = 'all';
    const cat = CATEGORIES.find(c => c.name.includes(type.replace('상품','').trim()));
    filterCat = cat ? cat.id : null;
  } else {
    filterType = type;
    filterCat = null;
  }
  renderCats(); renderList();
}

  renderList();
});

  document.getElementById('catSection').classList.remove('hidden');

function scoreItem(item, q) {
  const ql = q.toLowerCase();
  let s = 0;
  const title = (item.title || item.question || '').toLowerCase();
  const sum = (item.summary || '').toLowerCase();
  const kw = (item.keywords || []).join(' ').toLowerCase();
  if (title.includes(ql)) s += 10;
  if (sum.includes(ql)) s += 4;
  if (kw.includes(ql)) s += 3;
  q.split(/\s+/).forEach(w => {
    if (title.includes(w.toLowerCase())) s += 3;
    if (sum.includes(w.toLowerCase())) s += 1;
  });
  return s;
}

    data = data.map(d => ({ d, s: scoreItem(d, searchQuery) }))

function getTaxBracket(base) {
  if(base <= 10000) return { rate: 10, prog: 0 };
  else if(base <= 50000) return { rate: 20, prog: 1000 };
  else if(base <= 100000) return { rate: 30, prog: 6000 };
  else if(base <= 300000) return { rate: 40, prog: 16000 };
  else return { rate: 50, prog: 46000 };
}

window.execCalcGift = function() {
  const amt = Number(document.getElementById('giftAmt').value) || 0;
  const ded = Number(document.getElementById('giftRel').value) || 0;
  let base = Math.max(0, amt - ded);
  let taxObj = getTaxBracket(base);
  let calcTax = Math.max(0, (base * (taxObj.rate/100)) - taxObj.prog);
  let finalTax = calcTax * 0.97;

window.execCalcPen = function() {
  const age = Number(document.getElementById('penAge').value) || 0;
  const startAge = Number(document.getElementById('penStartAge').value) || 0;
  const current = Number(document.getElementById('penCurr').value) || 0;
  const monthly = Number(document.getElementById('penMon').value) || 0;
  const yieldRate = Number(document.getElementById('penYield').value) || 0;
  const infRate = Number(document.getElementById('penInf').value) || 0;
  
  const years = startAge - age;
  if (years <= 0) return alert("연금 개시 연령은 현재 연령보다 커야 합니다.");
  
  const n = years * 12;
  const r = yieldRate / 100 / 12;
  
  let fvCurr = current * Math.pow(1 + r, n);
  let fvMon = r === 0 ? monthly * n : monthly * ((Math.pow(1 + r, n) - 1) / r);
  let totalNominal = fvCurr + fvMon;
  
  let realTotal = totalNominal / Math.pow(1 + infRate/100, years);
  let limitNominal = totalNominal / 10 * 1.2;

  const res = document.getElementById('calcResult');
  res.classList.remove('hidden');
  res.innerHTML = `
    <h3 class="text-lg font-bold text-purple-900 border-b border-purple-200 pb-2 mb-3">연금 시뮬레이션 결과 (${years}년 후)</h3>

      <li class="flex justify-between"><span>원금 총액 (현재+추가납입):</span> <strong>${formatMoney(current + (monthly * n))}</strong></li>
      <li class="flex justify-between items-center"><span class="flex-1">미래 적립액 (명목금액):</span> <strong class="text-lg">${formatMoney(totalNominal)}</strong></li>
    </ul>
    <div class="bg-white rounded-lg p-4 flex flex-col gap-2 shadow-sm mb-3">
      <div class="flex justify-between items-center border-b border-slate-100 pb-2">
        <span class="font-bold text-slate-700 leading-tight">물가상승률 반영 현재가치<br><span class="text-xs font-normal text-slate-400">(실질 구매력)</span></span>
        <span class="text-xl font-bold text-emerald-600">${formatMoney(realTotal)}</span>
      </div>
      <div class="flex justify-between items-center pt-1">
        <span class="font-bold text-slate-700">개시 1년차 수령한도<br><span class="text-xs font-normal text-slate-400">(명목금액 기준, 초과시 기타소득세 16.5%)</span></span>
        <span class="text-lg font-bold text-blue-600">${formatMoney(limitNominal)}</span>
      </div>
    </div>
  `;
};

window.execCalcInc = function() {
  const earned = Number(document.getElementById('incEarned').value) || 0;
  const biz = Number(document.getElementById('incBiz').value) || 0;
  const ded = Number(document.getElementById('incDed').value) || 0;
  
  let earnedDed = 0;
  if(earned <= 500) earnedDed = earned * 0.7;
  else if(earned <= 1500) earnedDed = 350 + (earned-500)*0.4;
  else if(earned <= 4500) earnedDed = 750 + (earned-1500)*0.15;
  else if(earned <= 10000) earnedDed = 1200 + (earned-4500)*0.05;
  else earnedDed = 1475 + (earned-10000)*0.02;
  
  if(earnedDed > 2000) earnedDed = 2000;
  
  let earnedIncome = Math.max(0, earned - earnedDed);
  let totalIncome = earnedIncome + biz;
  let base = Math.max(0, totalIncome - ded);
  
  let rate = 0, prog = 0;
  if(base <= 1400) { rate = 6; prog = 0; }
  else if(base <= 5000) { rate = 15; prog = 126; }
  else if(base <= 8800) { rate = 24; prog = 576; }
  else if(base <= 15000) { rate = 35; prog = 1544; }
  else if(base <= 30000) { rate = 38; prog = 1994; }
  else if(base <= 50000) { rate = 40; prog = 2594; }
  else if(base <= 100000) { rate = 42; prog = 3594; }
  else { rate = 45; prog = 6594; }
  
  let calcTax = Math.max(0, (base * (rate/100)) - prog);
  let localTax = calcTax * 0.1;
  let totalTax = calcTax + localTax;

  const res = document.getElementById('calcResult');
  res.classList.remove('hidden');
  res.innerHTML = `
    <h3 class="text-lg font-bold text-purple-900 border-b border-purple-200 pb-2 mb-3">계산 결과</h3>
    <ul class="text-sm text-purple-800 space-y-2 mb-4">
      <li class="flex justify-between"><span>근로소득금액 (공제 후):</span> <strong>${formatMoney(earnedIncome)}</strong></li>
      <li class="flex justify-between"><span>종합소득금액 합산:</span> <strong>${formatMoney(totalIncome)}</strong></li>
      <li class="flex justify-between"><span>종합소득 과세표준:</span> <strong>${formatMoney(base)}</strong></li>
      <li class="flex justify-between"><span>적용세율:</span> <strong>${rate}% (누진공제 ${formatMoney(prog)})</strong></li>
    </ul>
    <div class="bg-white rounded-lg p-4 flex flex-col gap-2 shadow-sm">
      <div class="flex justify-between items-center">
        <span class="font-bold text-slate-700">종합소득세<br><span class="text-xs font-normal text-slate-400">(각종 세액공제 전)</span></span>
        <span class="text-xl font-bold text-purple-600">${formatMoney(calcTax)}</span>
      </div>
      <div class="flex justify-between items-center text-sm border-t border-slate-100 pt-2">
        <span class="text-slate-500">+ 지방소득세(10%)</span>
        <span class="text-slate-600">${formatMoney(localTax)}</span>
      </div>
      <div class="flex justify-between items-center border-t border-slate-100 pt-2">
        <span class="font-bold text-slate-800">예상 총 세부담</span>
        <span class="text-xl font-bold text-rose-500">${formatMoney(totalTax)}</span>
      </div>
    </div>
  `;
};

window.execCalcPensionTax = function() {
  const pubType = document.getElementById('ptPubType').value || '국민연금';
  const ageRate = Number(document.getElementById('ptAge').value) || 5;
  const pub = Number(document.getElementById('ptPub').value) || 0;
  const priv = Number(document.getElementById('ptPriv').value) || 0;
  const taxFree = Number(document.getElementById('ptTaxFree').value) || 0;
  
  const target = Number(document.getElementById('ptTarget').value) || 0;
  const years = Number(document.getElementById('ptYears').value) || 1;
  const yieldRate = Number(document.getElementById('ptYield').value) || 0;
  
  // 1. 공적연금 계산 (연금소득공제)
  let pDed = 0;
  if(pub <= 350) pDed = pub;
  else if(pub <= 700) pDed = 350 + (pub-350)*0.4;
  else if(pub <= 1400) pDed = 490 + (pub-700)*0.2;
  else if(pub <= 2100) pDed = 630 + (pub-1400)*0.1;
  else pDed = 700 + (pub-2100)*0.05;
  if(pDed > 900) pDed = 900; // 한도 900만원
  
  let pubInc = Math.max(0, pub - pDed);
  let basePub = Math.max(0, pubInc - 150); // 본인 기본공제 150만 반영
  
  let pRate = 0, pProg = 0;
  if(basePub <= 1400) { pRate = 6; pProg = 0; }
  else if(basePub <= 5000) { pRate = 15; pProg = 126; }
  else if(basePub <= 8800) { pRate = 24; pProg = 576; }
  else if(basePub <= 15000) { pRate = 35; pProg = 1544; }
  else if(basePub <= 30000) { pRate = 38; pProg = 1994; }
  else { pRate = 40; pProg = 2594; }
  
  let pubTax = Math.max(0, (basePub * (pRate/100)) - pProg);
  
  // 2. 사적연금 계산 (1,500만원 기준 분리과세)
  let privTax = 0;
  let privRateStr = '';
  if(priv <= 1500) {
    privTax = priv * (ageRate/100);
    privRateStr = `저율 분리과세 (${ageRate}%)`;
  } else {
    privTax = priv * 0.15;
    privRateStr = `분리과세 (15%, 1500만원 초과)`;
  }
  
  // 3. 총합
  let totalIncome = pub + priv + taxFree;
  let totalTax = pubTax + privTax;
  let totalLocalTax = totalTax * 0.1; // 지방소득세
  let finalTax = totalTax + totalLocalTax;
  let netIncome = totalIncome - finalTax;
  
  // 4. 부족분 및 보완 솔루션 계산 (PMT 역산)
  let shortfall = target - netIncome;
  let solutionHtml = '';
  
  if (shortfall > 0) {
     let r = yieldRate / 100;
     let r_month = r / 12;
     let months = years * 12;
     let retirementYears = 20;
     let retirementMonths = retirementYears * 12;
     let monthlyShortfall = shortfall / 12;
     
     // 은퇴 시점 필요 목돈 (연금의 현재가치)
     let requiredLumpSum = 0;
     if (r === 0) {
         requiredLumpSum = shortfall * retirementYears;
     } else {
         requiredLumpSum = monthlyShortfall * ( (1 - Math.pow(1 + r_month, -retirementMonths)) / r_month );
     }

     // 매월 필요 저축액 (미래가치를 위한 적립액)
     let monthlySavings = 0;
     if (r === 0) {
         monthlySavings = requiredLumpSum / months;
     } else {
         monthlySavings = requiredLumpSum / ( (Math.pow(1 + r_month, months) - 1) / r_month );
     }

     solutionHtml = `
       <div class="bg-blue-50 border border-blue-200 rounded-xl p-5 shadow-sm mt-5">
         <h4 class="text-lg font-bold text-blue-900 mb-3 flex items-center gap-2"><span>💡</span> 부족분 보완을 위한 스마트 솔루션</h4>
         <div class="space-y-3 text-sm text-blue-800">
           <p class="text-base leading-relaxed">목표하시는 연간 실수령액 대비 현재 예상액이 <strong class="text-rose-500 text-lg">연 ${formatMoney(shortfall)} (월 약 ${formatMoney(monthlyShortfall)}) 부족</strong>합니다.</p>
           <div class="bg-white p-4 sm:p-5 rounded-lg border border-blue-100 shadow-sm">
             <p class="mb-3 text-slate-700">은퇴 후 20년간 월 ${formatMoney(monthlyShortfall)}의 연금을 추가로 만들기 위해서는 은퇴 시점에 <strong>약 ${formatMoney(requiredLumpSum)}</strong>의 목돈이 마련되어야 합니다.</p>
             <div class="flex justify-between items-center bg-blue-100/40 p-4 rounded-xl">
               <span class="font-medium text-slate-700">은퇴까지 남은 ${years}년 동안<br><span class="text-primary-600 font-bold">매월 필요한 저축액</span></span>
               <span class="text-2xl font-bold text-primary-600">${formatMoney(monthlySavings)}</span>
             </div>
             <p class="text-[11px] text-slate-500 mt-3 leading-relaxed">
               ※ 예상 연수익률 ${yieldRate}% 가정.<br>
               ※ 저축성 보험의 10년 비과세 혜택, 연금저축/IRP 세액공제 재투자, ISA 계좌 등을 적극 활용하시면 세금 손실을 줄여 매월 필요한 저축액을 훨씬 낮출 수 있습니다. 자세한 포트폴리오 상담은 우측 하단 연락처를 이용해주세요.
             </p>
           </div>
         </div>
       </div>
     `;
  } else {
     solutionHtml = `
       <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-5 shadow-sm mt-5">
         <h4 class="text-lg font-bold text-emerald-900 flex items-center gap-2"><span>🎉</span> 안정적인 은퇴 준비 완료!</h4>
         <p class="text-emerald-800 mt-2 leading-relaxed">예상 세후 실수령액이 목표액을 <strong class="text-emerald-600 text-base">연 ${formatMoney(Math.abs(shortfall))}</strong> 초과 달성했습니다. 여유로운 은퇴 생활이 기대됩니다.</p>
       </div>
     `;
  }
  
  const res = document.getElementById('calcResult');
  res.classList.remove('hidden');
  res.innerHTML = `
    <div class="bg-purple-50 border border-purple-100 rounded-xl p-5">
      <h3 class="text-lg font-bold text-purple-900 border-b border-purple-200 pb-2 mb-3">연금소득세 계산 결과</h3>
      
      <div class="space-y-3 mb-4">
        <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
          <div class="text-sm font-bold text-slate-700 mb-1">1. 비과세 연금</div>
          <div class="flex justify-between text-sm"><span class="text-slate-500">수령액: ${formatMoney(taxFree)}</span> <span class="font-semibold text-emerald-600">세금: 0원</span></div>
        </div>
        
        <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
          <div class="text-sm font-bold text-slate-700 mb-1">2. 사적 연금 (세액공제분 등)</div>
          <div class="flex justify-between text-sm mb-1"><span class="text-slate-500">수령액: ${formatMoney(priv)}</span> <span class="font-semibold text-slate-800">소득세: ${formatMoney(privTax)}</span></div>
          <div class="text-xs text-slate-400 mt-1">👉 적용 방식: ${privRateStr}</div>
          ${priv > 1500 ? '<div class="text-xs text-amber-500 mt-1">※ 사적연금 1,500만원 초과 시 종합과세와 비교하여 유리한 방식을 선택 가능합니다.</div>' : ''}
        </div>

        <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-100">
          <div class="text-sm font-bold text-slate-700 mb-1">3. 공적 연금 (${pubType})</div>
          <div class="flex justify-between text-sm mb-1"><span class="text-slate-500">수령액: ${formatMoney(pub)}</span> <span class="font-semibold text-slate-800">예상 소득세: ${formatMoney(pubTax)}</span></div>
          <div class="text-xs text-slate-400 mt-1">👉 연금소득공제(-${formatMoney(pDed)}) 및 본인공제(-150만) 반영 과표: ${formatMoney(basePub)}</div>
        </div>
      </div>
      
      <div class="bg-purple-100/50 rounded-lg p-4 flex flex-col gap-2 shadow-inner border border-purple-200">
        <div class="flex justify-between items-center text-sm">
          <span class="font-semibold text-slate-700">연간 총 연금 수령액</span>
          <span class="font-bold text-slate-800 text-lg">${formatMoney(totalIncome)}</span>
        </div>
        <div class="flex justify-between items-center border-t border-purple-200 pt-2 text-sm">
          <span class="text-slate-600">총 연금소득세 <span class="text-xs">(지방세 포함)</span></span>
          <span class="text-lg font-bold text-rose-500">- ${formatMoney(finalTax)}</span>
        </div>
        <div class="flex justify-between items-center border-t border-purple-200 pt-2 mt-1">
          <span class="font-bold text-slate-800">예상 세후 실수령액</span>
          <span class="text-2xl font-bold text-primary-600">${formatMoney(netIncome)}</span>
        </div>
      </div>
    </div>
    
    ${solutionHtml}
  `;
};

// 초기화 실행
renderCats();
renderList();

</script>
</body>
</html>
