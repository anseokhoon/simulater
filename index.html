function formatMoney(manWon) {
  if (manWon === 0) return '0원';
  if (manWon < 0) return '-' + formatMoney(Math.abs(manWon));
  const uk = Math.floor(manWon / 10000);
  const man = Math.round(manWon % 10000);
  let res = '';
  if (uk > 0) res += uk.toLocaleString() + '억 ';
  if (man > 0) res += man.toLocaleString() + '만 ';
  return res.trim() + '원';
}

function scoreItem(item, q) {
  const ql = q.toLowerCase(); let s = 0;
  const title = (item.title || item.question || '').toLowerCase();
  const sum = (item.summary || '').toLowerCase();
  const kw = (item.keywords || []).join(' ').toLowerCase();
  if (title.includes(ql)) s += 10;
  if (sum.includes(ql)) s += 4;
  if (kw.includes(ql)) s += 3;
  return s;
}

function renderList() {
  let data = [...ALL_DATA];
  if (filterType !== 'all') data = data.filter(d => d.type === filterType);
  if (filterCat) data = data.filter(d => getMainCatId(d.cat_id) === filterCat);  
  if (searchQuery) data = data.map(d => ({ d, s: scoreItem(d, searchQuery) })).filter(x => x.s > 0).sort((a, b) => b.s - a.s).map(x => x.d);

  document.getElementById('resultTitle').innerHTML = searchQuery ? `검색 결과 <span class="text-brand-500">"${searchQuery}"</span>` : '전체 문서';

    const badge = badgeMap[item.type];

    return `
      <div onclick="openModal(${item.id})" class="group bg-white rounded-[1.5rem] p-5 sm:p-6 shadow-soft hover:shadow-float hover:-translate-y-0.5 transition-all duration-300 cursor-pointer animate-fade-in border border-transparent hover:border-brand-100">
        <div class="flex justify-between items-start gap-4 mb-3">
          <h3 class="text-[1.05rem] sm:text-lg font-extrabold text-brand-900 leading-snug group-hover:text-brand-600 transition-colors">${isQa ? '<span class="text-emerald-500 mr-1.5">Q.</span>' : ''}${item.title || item.question}</h3>

        <div>

          <select id="inhSpouseAlive" class="${inputClass}" onchange="window.toggleSpouseAmt()">
            <option value="Y">생존함 (배우자 공제 적용)</option>
            <option value="N">생존하지 않음</option>
          </select>
        </div>
        <div id="spouseAmtWrap" class="animate-fade-in">
          <label class="${labelClass}">배우자 실제 상속(받을) 금액 (만원)<br><span class="text-[0.7rem] font-normal text-brand-500 block mt-1">※ 법정상속지분 이내라고 가정합니다 (최대 30억 한도)</span></label>
          <input type="number" id="inhSpouseAmt" class="${inputClass}" value="50000">
        </div>
        <button onclick="execCalcInh()" class="${btnClass}">예상 상속세 계산하기</button>
        <div id="calcResult" class="hidden mt-6 bg-purple-50 border border-purple-100 rounded-2xl p-6 animate-fade-in"></div>
      `;
    } else if (item.calcType === 'periodic_gift') {
      body += `
        <div class="bg-blue-50 p-4 rounded-xl mb-4 text-[0.85rem] text-blue-800 leading-relaxed">
          자녀 명의 계좌에 매월 일정 금액을 입금하기로 약정할 때 사용하는 계산기입니다.<br>미래의 총 납입액을 <strong>법정할인율(연 3%)</strong>로 할인하여 현재 시점의 증여재산가액을 산출합니다.
        </div>
        <div><label class="${labelClass}">매월 납입 약정액 (만원)</label><input type="number" id="perMonthly" class="${inputClass}" placeholder="예: 100" value="100"></div>
        <div><label class="${labelClass}">증여(납입) 기간 (년)</label><input type="number" id="perYears" class="${inputClass}" placeholder="예: 10" value="10"></div>
        <button onclick="execCalcPeriodic()" class="${btnClass}">유기정기금 현재가치 평가하기</button>
        <div id="calcResult" class="hidden mt-6 bg-emerald-50 border border-emerald-100 rounded-2xl p-6 animate-fade-in"></div>
      `;
    } else if (item.calcType === 'pension_tax') {
       body += `<div class="text-center py-10 text-brand-500 font-bold">연금소득세 시뮬레이터가 곧 업데이트 됩니다.</div>`;
    }
    body += `</div></div>`;
  } else if (item.type === 'qa') {
    body += `<div class="bg-emerald-50/50 border border-emerald-100 rounded-2xl p-6 mb-2 relative"><div class="absolute -top-3 left-5 bg-emerald-500 text-white text-xs font-bold px-3.5 py-1.5 rounded-full shadow-sm tracking-wide">답변</div><div class="prose mt-3 text-emerald-950">${item.answer}</div></div>`;
  } else if (item.type === 'example') {
    body += `<div class="space-y-4"><div class="bg-amber-50/50 border border-amber-100 rounded-2xl p-6"><div class="text-xs font-extrabold text-amber-600 uppercase mb-3">상황</div><p class="text-amber-950 text-[0.95rem] leading-relaxed">${item.situation}</p></div><div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-6"><div class="text-xs font-extrabold text-blue-600 uppercase mb-3">분석</div><div class="prose text-blue-950">${item.analysis}</div></div><div class="bg-brand-50/50 border border-brand-100 rounded-2xl p-6"><div class="text-xs font-extrabold text-brand-600 uppercase mb-3">결론</div><div class="prose font-bold text-brand-900">${item.conclusion}</div></div></div>`;
  } else {
    body += `<div class="prose max-w-none">${item.content || item.summary}</div>`;
  }

  const mBody = document.getElementById('modalBody');
  mBody.innerHTML = body;
  
  const mOverlay = document.getElementById('modalOverlay');
  const mContent = document.getElementById('modal');
  mBody.scrollTop = 0;
  mOverlay.classList.remove('hidden'); void mOverlay.offsetWidth;
  mOverlay.classList.remove('opacity-0'); mOverlay.classList.add('opacity-100');
  mContent.classList.remove('translate-y-full'); mContent.classList.add('translate-y-0');
  document.body.style.overflow = 'hidden';
  
  if(item.calcType === 'gift') window.toggleSpecialDed();
  if(item.calcType === 'inheritance') window.toggleSpouseAmt();
}

function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect() {
  const mOverlay = document.getElementById('modalOverlay'), mContent = document.getElementById('modal');
  mOverlay.classList.remove('opacity-100'); mOverlay.classList.add('opacity-0');
  mContent.classList.remove('translate-y-0'); mContent.classList.add('translate-y-full');
  setTimeout(() => { mOverlay.classList.add('hidden'); document.body.style.overflow = ''; }, 400);
}

// /* STREAMING_CHUNK:Calculator Engine Logic (Inheritance, Gift, Periodic)... */
function getTaxBracket(base) {
  if(base <= 10000) return { rate: 10, prog: 0 };
  else if(base <= 50000) return { rate: 20, prog: 1000 };
  else if(base <= 100000) return { rate: 30, prog: 6000 };
  else if(base <= 300000) return { rate: 40, prog: 16000 };
  else return { rate: 50, prog: 46000 };
}

window.toggleSpecialDed = function() {
  const rel = document.getElementById('giftRel')?.value;
  const wrap = document.getElementById('specialDedWrap');
  if(rel === '5000' || rel === '2000') { wrap.style.display = 'block'; } 
  else { wrap.style.display = 'none'; document.getElementById('giftSpecial').value = "0"; }
};

window.toggleSpouseAmt = function() {
  const isAlive = document.getElementById('inhSpouseAlive')?.value;
  const wrap = document.getElementById('spouseAmtWrap');
  if(isAlive === 'Y') wrap.style.display = 'block'; else wrap.style.display = 'none';
};

window.execCalcGift = function() {
  const amt = Number(document.getElementById('giftAmt').value) || 0;
  if(amt <= 0) return document.getElementById('calcError').classList.remove('hidden');
  document.getElementById('calcError').classList.add('hidden');
  
  let basicDed = Number(document.getElementById('giftRel').value) || 0;
  let specialDed = Number(document.getElementById('giftSpecial').value) || 0;
  
  let totalDed = basicDed + specialDed;
  let base = Math.max(0, amt - totalDed);
  let taxObj = getTaxBracket(base);
  let calcTax = Math.max(0, (base * (taxObj.rate/100)) - taxObj.prog);
  let finalTax = calcTax * 0.97;

  const res = document.getElementById('calcResult');
  res.classList.remove('hidden');
  res.innerHTML = `
    <h3 class="text-lg font-extrabold text-purple-900 border-b-2 border-purple-200 pb-3 mb-4">증여세 계산 결과</h3>
    <ul class="text-[0.95rem] text-purple-800 space-y-3 mb-5">
      <li class="flex justify-between items-center"><span class="font-medium">적용된 총 공제액:</span> <strong>${formatMoney(totalDed)}</strong></li>
      <li class="flex justify-between items-center"><span class="font-medium">과세표준:</span> <strong class="text-lg">${formatMoney(base)}</strong></li>
      <li class="flex justify-between items-center"><span class="font-medium">적용세율:</span> <strong>${taxObj.rate}% (누진공제 ${formatMoney(taxObj.prog)})</strong></li>
    </ul>
    <div class="bg-white rounded-xl p-5 flex justify-between items-center shadow-sm">
      <span class="font-bold text-slate-700 leading-tight">예상 납부세액<br><span class="text-xs font-medium text-slate-400">(신고세액공제 3% 적용)</span></span>
      <span class="text-2xl font-extrabold text-purple-600">${formatMoney(finalTax)}</span>
    </div>
  `;
};

window.execCalcInh = function() {
  const amt = Number(document.getElementById('inhAmt').value) || 0;
  if(amt <= 0) return document.getElementById('calcError').classList.remove('hidden');
  document.getElementById('calcError').classList.add('hidden');
  
  const children = Number(document.getElementById('inhChild').value) || 0;
  const isSpouseAlive = document.getElementById('inhSpouseAlive').value === 'Y';
  const spouseAmt = Number(document.getElementById('inhSpouseAmt').value) || 0;
  
  // 기초공제(2억) + 인적공제(자녀수*5000만)
  let basicDed = 20000 + (children * 5000);
  // 일괄공제(5억)와 비교하여 큰 금액 적용
  let generalDed = Math.max(50000, basicDed);
  
  // 배우자 공제: 최소 5억 보장, 최대 30억 한도 내 실제 상속금액
  let spouseDed = 0;
  if(isSpouseAlive) {
    spouseDed = Math.max(50000, Math.min(spouseAmt, 300000));
  }
  
  let totalDed = generalDed + spouseDed;
  let base = Math.max(0, amt - totalDed);
  let taxObj = getTaxBracket(base);
  let calcTax = Math.max(0, (base * (taxObj.rate/100)) - taxObj.prog);
  let finalTax = calcTax * 0.97; // 신고세액공제 3%

  const res = document.getElementById('calcResult');
  res.classList.remove('hidden');
  res.innerHTML = `
    <h3 class="text-lg font-extrabold text-purple-900 border-b-2 border-purple-200 pb-3 mb-4">상속세 계산 결과</h3>
    <ul class="text-[0.95rem] text-purple-800 space-y-3 mb-5">
      <li class="flex justify-between items-center"><span class="font-medium">일반/일괄공제 적용액:</span> <strong>${formatMoney(generalDed)}</strong></li>
      <li class="flex justify-between items-center"><span class="font-medium">배우자 상속공제액:</span> <strong>${formatMoney(spouseDed)}</strong></li>
      <li class="flex justify-between items-center border-t border-purple-200/50 pt-2"><span class="font-bold">과세표준 (가액-총공제):</span> <strong class="text-lg">${formatMoney(base)}</strong></li>
      <li class="flex justify-between items-center"><span class="font-medium">적용세율:</span> <strong>${taxObj.rate}% (누진공제 ${formatMoney(taxObj.prog)})</strong></li>
    </ul>
    <div class="bg-white rounded-xl p-5 flex justify-between items-center shadow-sm">
      <span class="font-bold text-slate-700 leading-tight">예상 납부세액<br><span class="text-xs font-medium text-slate-400">(신고세액공제 3% 적용)</span></span>
      <span class="text-2xl font-extrabold text-purple-600">${formatMoney(finalTax)}</span>
    </div>
  `;
};

window.execCalcPeriodic = function() {
  const monthly = Number(document.getElementById('perMonthly').value) || 0;
  const years = Number(document.getElementById('perYears').value) || 0;
  
  if(monthly <= 0 || years <= 0) return document.getElementById('calcError').classList.remove('hidden');
  document.getElementById('calcError').classList.add('hidden');
  
  const annual = monthly * 12;
  const nominalTotal = annual * years;
  
  // 유기정기금 현재가치 평가 (할인율 연 3%)
  let presentValue = 0;
  for(let i=1; i<=years; i++) {
    presentValue += annual / Math.pow(1.03, i);
  }
  
  const savedAmount = nominalTotal - presentValue;

  const res = document.getElementById('calcResult');
  res.classList.remove('hidden');
  res.innerHTML = `
    <h3 class="text-lg font-extrabold text-emerald-900 border-b-2 border-emerald-200 pb-3 mb-4">유기정기금 평가 결과</h3>
    <ul class="text-[0.95rem] text-emerald-800 space-y-3 mb-5">
      <li class="flex justify-between items-center"><span class="font-medium">기간 내 단순 합산액:</span> <strong class="text-slate-500 line-through">${formatMoney(nominalTotal)}</strong></li>
      <li class="flex justify-between items-center border-b border-emerald-100 pb-3"><span class="font-bold">평가에 따른 가액 하락분:</span> <strong class="text-blue-600">-${formatMoney(savedAmount)}</strong></li>
    </ul>
    <div class="bg-white rounded-xl p-5 flex flex-col gap-2 shadow-sm border border-emerald-100">
      <span class="font-bold text-slate-700 leading-tight">할인 적용된 증여재산가액<br><span class="text-[0.75rem] font-medium text-slate-400">(이 금액을 기준으로 증여세가 부과됩니다)</span></span>
      <span class="text-2xl font-extrabold text-emerald-600 self-end mt-1">${formatMoney(presentValue)}</span>
    </div>
  `;
};

// /* STREAMING_CHUNK:Initialization on page load... */
renderCats();
renderList();
</script>
</body>
</html>
