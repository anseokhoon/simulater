<script>
function formatMoney(manWon) {
  if (manWon === 0) return '0원';
  if (manWon < 0) return '-' + formatMoney(Math.abs(manWon));
  const uk = Math.floor(manWon / 10000);
  const man = Math.round(manWon % 10000);
  let res = '';
  if (uk > 0) res += uk.toLocaleString() + '억 ';
  if (man > 0) res += man.toLocaleString() + '만 ';
  return res.trim() + '원';
}

  { id:3, cat_id:31, type:'article', title:'저축성보험 보험차익 비과세 요건', summary:'월적립식은 5년 이상 납입·10년 이상 유지·월 150만원 이하, 일시납은 1억원 이하·10년 이상 유지 시 이자소득세 비과세.', keywords:['보험차익','비과세','10년','5년','150만원','1억원','저축성보험'], page:20, law:'소득세법 제16조, 시행령 제25조', content:`<h2>저축성보험 보험차익 비과세</h2><h3>월적립식 저축성보험</h3><table><tr><th>요건</th><th>내용</th></tr><tr><td>납입기간</td><td><strong>5년 이상</strong> 납입</td></tr><tr><td>유지기간</td><td><strong>10년 이상</strong> 유지</td></tr><tr><td>월 보험료</td><td><strong>150만원 이하</strong></td></tr></table><h3>일시납 저축성보험</h3><table><tr><th>요건</th><th>내용</th></tr><tr><td>납입한도</td><td>1인당 <strong>1억원 이하</strong></td></tr><tr><td>유지기간</td><td><strong>10년 이상</strong> 유지</td></tr></table><blockquote>⚠️ 1억원 초과 일시납은 10년 유지해도 비과세 불가</blockquote><h3>비과세 배제 사유</h3><ul><li>최초 납입일로부터 10년 미만 중도해지</li><li>월 보험료 150만원 초과</li><li>보험계약 대출 이용 시</li></ul>` },
  { id:4, cat_id:33, type:'article', title:'보험금과 증여세 (상증법 제34조)', summary:'계약자·피보험자·수익자가 다른 경우 보험금 수령 시 타인 납부 보험료 비율만큼 증여세 과세.', keywords:['보험금','증여세','계약자','수익자'], page:27, law:'상증법 제34조', content:`<h2>보험금과 증여세</h2><blockquote><strong>증여재산가액 = 보험금 × (타인이 납부한 보험료 / 총 납부 보험료)</strong></blockquote><table><tr><th>계약자</th><th>피보험자</th><th>수익자</th><th>과세</th></tr><tr><td>본인</td><td>본인</td><td>본인</td><td>비과세</td></tr><tr><td>A(부)</td><td>A(부)</td><td>B(자녀)</td><td>✅ 증여세</td></tr><tr><td>A(부)</td><td>B(자녀)</td><td>B(자녀)</td><td>✅ 증여세(A 납부분)</td></tr></table>` },
  { id:5, cat_id:4, type:'article', title:'금융소득 종합과세 기준', summary:'연간 금융소득 2,000만원 초과 시 다른 소득과 합산하여 종합과세. 이하는 14% 분리과세로 종결.', keywords:['금융소득 종합과세','2000만원','분리과세'], page:33, law:'소득세법 제14조', content:`<h2>금융소득 종합과세</h2><table><tr><th>구분</th><th>과세 방법</th></tr><tr><td><strong>2,000만원 이하</strong></td><td>14% <strong>분리과세</strong> (원천징수로 완료)</td></tr><tr><td><strong>2,000만원 초과</strong></td><td>전액 <strong>종합과세</strong> (다른 소득과 합산)</td></tr></table><h3>비교산출세액 특례</h3><p>두 방법 중 큰 금액으로 납부:</p><ul><li>방법1: 금융소득 포함 종합소득 × 종합소득세율</li><li>방법2: (2,000만원 초과분 + 다른 소득) × 세율 + 2,000만원 × 14%</li></ul>` },
  { id:6, cat_id:52, type:'article', title:'사적연금 수령 시 과세세율', summary:'사적연금 연금 수령 시 나이에 따라 3%~5% 저율 분리과세. 한도 초과 인출 시 기타소득 과세.', keywords:['사적연금','연금소득세율','5%','연금수령한도'], page:37, law:'소득세법 제129조', content:`<h2>사적연금 수령 시 과세</h2><table><tr><th>수령 연령</th><th>세율</th></tr><tr><td>70세 미만</td><td><strong>5%</strong></td></tr><tr><td>70세 이상 ~ 80세 미만</td><td><strong>4%</strong></td></tr><tr><td>80세 이상</td><td><strong>3%</strong></td></tr></table><h3>연금수령한도 계산식</h3><blockquote><strong>연금수령한도 = 연금계좌 평가액 ÷ (11 − 연금수령 연차) × 120%</strong></blockquote><p>예) 평가액 1억원, 1년차: 1억 ÷ 10 × 1.2 = <strong>1,200만원</strong></p><table><tr><th>수령 방법</th><th>세율</th></tr><tr><td>한도 이내 연금 수령</td><td><strong>3~5%</strong></td></tr><tr><td>한도 초과 인출</td><td><strong>기타소득세 16.5%</strong></td></tr></table>` },
  { id:7, cat_id:61, type:'article', title:'증여재산 공제 한도', summary:'10년 합산 배우자 6억, 성년 자녀 5천만 공제. 혼인·출산 공제 1억 추가 가능.', keywords:['증여세공제','5000만원','혼인공제'], page:40, law:'상증법 제53조', content:`<h2>증여재산공제 (10년 합산)</h2><table><tr><th>증여자</th><th>공제 한도</th></tr><tr><td>배우자</td><td><strong>6억원</strong></td></tr><tr><td>직계존속 (성년)</td><td><strong>5,000만원</strong></td></tr><tr><td>직계존속 (미성년)</td><td><strong>2,000만원</strong></td></tr><tr><td>직계비속</td><td><strong>5,000만원</strong></td></tr><tr><td>기타 친족</td><td><strong>1,000만원</strong></td></tr></table><blockquote>혼인·출산 공제: 혼인 전후 2년 또는 출산 후 2년 이내 <strong>1억원</strong> 추가 공제</blockquote><p><strong>신고기한</strong>: 증여일이 속한 달의 말일로부터 <strong>3개월</strong> 이내</p>` },

let filterCat = null;
let filterSubCat = null;

const getMainCatId = (catId) => catId <= 9 ? catId : (CAT_MAP[catId] || catId);

function renderCats() {
  const parents = CATEGORIES.filter(c => c.parent_id === null);
  catGrid.innerHTML = parents.map(c => {
    const cnt = ALL_DATA.filter(d => getMainCatId(d.cat_id) === c.id).length;
    const isSel = filterCat === c.id;
    return `
      <div onclick="toggleCat(${c.id})" class="shrink-0 w-24 sm:w-28 flex flex-col items-center justify-center p-3 rounded-2xl cursor-pointer transition-all duration-300 border-2 snap-center ${isSel ? 'border-brand-500 bg-brand-50 shadow-md transform scale-95' : 'border-transparent bg-white shadow-soft hover:shadow-md hover:bg-brand-50/50'}">
        <span class="text-3xl mb-2 block transition-transform ${isSel ? 'scale-110' : ''}">${c.emoji}</span>
        <div class="text-[0.7rem] sm:text-xs font-bold text-center leading-tight ${isSel ? 'text-brand-800' : 'text-slate-600'} break-keep">${c.name}</div>
        <div class="text-[0.65rem] mt-1 font-semibold ${isSel ? 'text-brand-500' : 'text-slate-400'}">${cnt}</div>
      </div>
    `;
  }).join('');

  if (filterCat) {
    const subs = CATEGORIES.filter(c => c.parent_id === filterCat);
    if (subs.length > 0) {
      subCatArea.classList.remove('hidden');
      subCatArea.innerHTML = subs.map(s => {
        const cnt = ALL_DATA.filter(d => d.cat_id === s.id).length;
        const isSel = filterSubCat === s.id;
        return `
          <button onclick="toggleSubCat(${s.id})" class="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-bold transition-all shadow-sm ${isSel ? 'bg-brand-700 text-white' : 'bg-white text-brand-600 border border-brand-100 hover:bg-brand-50'}">

          </button>
        `;
      }).join('');
    } else {
      subCatArea.classList.add('hidden');
    }
  } else {
    subCatArea.classList.add('hidden');
    filterSubCat = null;
  }
}

function toggleCat(id) {
  if (filterCat === id) { filterCat = null; filterSubCat = null; } 
  else { filterCat = id; filterSubCat = null; }
  renderCats(); renderList();
}
function toggleSubCat(id) {
  filterSubCat = filterSubCat === id ? null : id;

}
function setFilter(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => {

  const catNames = ['조세일반','보험','금융소득','연금','증여세','상속세'];
  if (catNames.some(n => type.includes(n))) {
    filterType = 'all';
    const cat = CATEGORIES.find(c => c.name.includes(type.replace('상품','').trim()));
    filterCat = cat ? cat.id : null;
  } else {
    filterType = type;

  }
  renderCats(); renderList();
}

document.getElementById('searchInput').addEventListener('input', function(e) {

function scoreItem(item, q) {
  const ql = q.toLowerCase();
  let s = 0;
  const title = (item.title || item.question || '').toLowerCase();
  const sum = (item.summary || '').toLowerCase();
  const kw = (item.keywords || []).join(' ').toLowerCase();
  if (title.includes(ql)) s += 10;
  if (sum.includes(ql)) s += 4;
  if (kw.includes(ql)) s += 3;
  q.split(/\s+/).forEach(w => {
    if (title.includes(w.toLowerCase())) s += 3;
    if (sum.includes(w.toLowerCase())) s += 1;
  });
  return s;
}

function renderList() {
  let data = [...ALL_DATA];

  if (filterType !== 'all') data = data.filter(d => d.type === filterType);
  if (filterSubCat) data = data.filter(d => d.cat_id === filterSubCat);
  else if (filterCat) data = data.filter(d => getMainCatId(d.cat_id) === filterCat);
  
  if (searchQuery) {
    data = data.map(d => ({ d, s: scoreItem(d, searchQuery) }))
               .filter(x => x.s > 0).sort((a, b) => b.s - a.s).map(x => x.d);
  }

  if (searchQuery) {
    resultTitle.innerHTML = `검색 결과 <span class="text-brand-500">"${searchQuery}"</span>`;

    const badge = badgeMap[item.type];

    return `

  modalContent.classList.remove('translate-y-0');
  modalContent.classList.add('translate-y-full');
  
  setTimeout(() => {
    modalOverlay.classList.add('hidden');
    document.body.style.overflow = '';
  }, 400); // 바텀시트 내려가는 시간(duration-400)과 일치
}

function showError(msg) {
  const errDiv = document.getElementById('calcError');
  errDiv.textContent = msg;
  errDiv.classList.remove('hidden');
  document.getElementById('calcResult').classList.add('hidden');
}
function hideError() {
  document.getElementById('calcError').classList.add('hidden');
}

function getTaxBracket(base) {
  if(base <= 10000) return { rate: 10, prog: 0 };
  else if(base <= 50000) return { rate: 20, prog: 1000 };
  else if(base <= 100000) return { rate: 30, prog: 6000 };
  else if(base <= 300000) return { rate: 40, prog: 16000 };
  else return { rate: 50, prog: 46000 };
}

window.execCalcGift = function() {
  hideError();
  const amt = Number(document.getElementById('giftAmt').value) || 0;
  if(amt <= 0) return showError("증여재산가액을 입력해주세요.");
  
  const ded = Number(document.getElementById('giftRel').value) || 0;
  let base = Math.max(0, amt - ded);
  let taxObj = getTaxBracket(base);
  let calcTax = Math.max(0, (base * (taxObj.rate/100)) - taxObj.prog);
  let finalTax = calcTax * 0.97;

  const res = document.getElementById('calcResult');
  res.classList.remove('hidden');
  res.innerHTML = `
    <h3 class="text-lg font-extrabold text-purple-900 border-b-2 border-purple-200 pb-3 mb-4">계산 결과</h3>
    <ul class="text-[0.95rem] text-purple-800 space-y-3 mb-5">
      <li class="flex justify-between items-center"><span class="font-medium">과세표준 (가액-공제):</span> <strong class="text-lg">${formatMoney(base)}</strong></li>
      <li class="flex justify-between items-center"><span class="font-medium">적용세율:</span> <strong>${taxObj.rate}% (누진공제 ${formatMoney(taxObj.prog)})</strong></li>
    </ul>
    <div class="bg-white rounded-xl p-5 flex justify-between items-center shadow-sm">
      <span class="font-bold text-slate-700 leading-tight">예상 납부세액<br><span class="text-xs font-medium text-slate-400">(신고세액공제 3% 적용)</span></span>
      <span class="text-2xl font-extrabold text-purple-600">${formatMoney(finalTax)}</span>

  `;
};

window.execCalcPen = function() {
  hideError();
  const age = Number(document.getElementById('penAge').value) || 0;
  const startAge = Number(document.getElementById('penStartAge').value) || 0;
  const current = Number(document.getElementById('penCurr').value) || 0;
  const monthly = Number(document.getElementById('penMon').value) || 0;
  const yieldRate = Number(document.getElementById('penYield').value) || 0;
  const infRate = Number(document.getElementById('penInf').value) || 0;
  
  const years = startAge - age;
  if (years <= 0) return showError("연금 개시 연령은 현재 연령보다 커야 합니다.");
  
  const n = years * 12;
  const r = yieldRate / 100 / 12;
  
  let fvCurr = current * Math.pow(1 + r, n);
  let fvMon = r === 0 ? monthly * n : monthly * ((Math.pow(1 + r, n) - 1) / r);
  let totalNominal = fvCurr + fvMon;
  let realTotal = totalNominal / Math.pow(1 + infRate/100, years);
  let limitNominal = totalNominal / 10 * 1.2;

  const res = document.getElementById('calcResult');
  res.classList.remove('hidden');
  res.innerHTML = `
    <h3 class="text-lg font-extrabold text-brand-900 border-b-2 border-brand-200 pb-3 mb-4">시뮬레이션 결과 (${years}년 후)</h3>
    <ul class="text-[0.95rem] text-brand-800 space-y-3 mb-5">
      <li class="flex justify-between items-center"><span class="font-medium">납입 원금 총액:</span> <strong>${formatMoney(current + (monthly * n))}</strong></li>
      <li class="flex justify-between items-center"><span class="font-medium">미래 적립액 (명목가치):</span> <strong class="text-lg">${formatMoney(totalNominal)}</strong></li>
    </ul>
    <div class="bg-white rounded-xl p-5 flex flex-col gap-3 shadow-sm">
      <div class="flex justify-between items-center border-b border-brand-50 pb-3">
        <span class="font-bold text-slate-700 leading-tight">물가상승 반영 현재가치<br><span class="text-xs font-medium text-slate-400">(실질 구매력)</span></span>
        <span class="text-xl font-extrabold text-emerald-600">${formatMoney(realTotal)}</span>
      </div>
      <div class="flex justify-between items-center pt-1">
        <span class="font-bold text-slate-700 leading-tight">개시 1년차 수령한도<br><span class="text-xs font-medium text-slate-400">(초과시 기타소득세 16.5%)</span></span>
        <span class="text-lg font-extrabold text-blue-600">${formatMoney(limitNominal)}</span>
      </div>
    </div>
  `;
};

window.execCalcPensionTax = function() {
  hideError();
  const pubType = document.getElementById('ptPubType').value || '국민연금';
  const ageRate = Number(document.getElementById('ptAge').value) || 5;
  const pub = Number(document.getElementById('ptPub').value) || 0;
  const priv = Number(document.getElementById('ptPriv').value) || 0;
  const taxFree = Number(document.getElementById('ptTaxFree').value) || 0;
  
  const target = Number(document.getElementById('ptTarget').value) || 0;
  const years = Number(document.getElementById('ptYears').value) || 1;
  const yieldRate = Number(document.getElementById('ptYield').value) || 0;
  
  if (years <= 0) return showError("은퇴까지 남은 기간은 1년 이상이어야 합니다.");

  // 1. 공적연금(직역연금 포함) 연금소득공제 계산
  let pDed = 0;
  if(pub <= 350) pDed = pub;
  else if(pub <= 700) pDed = 350 + (pub-350)*0.4;
  else if(pub <= 1400) pDed = 490 + (pub-700)*0.2;
  else if(pub <= 2100) pDed = 630 + (pub-1400)*0.1;
  else pDed = 700 + (pub-2100)*0.05;
  if(pDed > 900) pDed = 900;
  
  let pubInc = Math.max(0, pub - pDed);
  let basePub = Math.max(0, pubInc - 150); // 본인 기본공제 150만
  
  let pRate = 0, pProg = 0;
  if(basePub <= 1400) { pRate = 6; pProg = 0; }
  else if(basePub <= 5000) { pRate = 15; pProg = 126; }
  else if(basePub <= 8800) { pRate = 24; pProg = 576; }
  else if(basePub <= 15000) { pRate = 35; pProg = 1544; }
  else if(basePub <= 30000) { pRate = 38; pProg = 1994; }
  else { pRate = 40; pProg = 2594; }
  
  let pubTax = Math.max(0, (basePub * (pRate/100)) - pProg);
  
  // 2. 사적연금 계산 (1,500만원 기준 분리과세)
  let privTax = 0;
  let privRateStr = '';
  if(priv <= 1500) {
    privTax = priv * (ageRate/100);
    privRateStr = `저율 분리과세 (${ageRate}%)`;
  } else {
    privTax = priv * 0.15;
    privRateStr = `분리과세 (15%, 1500만원 초과)`;
  }
  
  // 3. 총합
  let totalIncome = pub + priv + taxFree;
  let totalTax = pubTax + privTax;
  let totalLocalTax = totalTax * 0.1; // 지방소득세
  let finalTax = totalTax + totalLocalTax;
  let netIncome = totalIncome - finalTax;
  
  // 4. 부족분 역산 솔루션 계산 (PMT)
  let shortfall = target - netIncome;
  let solutionHtml = '';
  
  if (shortfall > 0) {
     let r = yieldRate / 100;
     let r_month = r / 12;
     let months = years * 12;
     let retirementYears = 20;
     let retirementMonths = retirementYears * 12;
     let monthlyShortfall = shortfall / 12;
     
     // 은퇴 시점 필요 목돈 (연금의 현재가치)
     let requiredLumpSum = 0;
     if (r === 0) {
         requiredLumpSum = shortfall * retirementYears;
     } else {
         requiredLumpSum = monthlyShortfall * ( (1 - Math.pow(1 + r_month, -retirementMonths)) / r_month );
     }

     // 매월 필요 저축액 (미래가치를 위한 적립액)
     let monthlySavings = 0;
     if (r === 0) {
         monthlySavings = requiredLumpSum / months;
     } else {
         monthlySavings = requiredLumpSum / ( (Math.pow(1 + r_month, months) - 1) / r_month );
     }

     solutionHtml = `
       <div class="bg-blue-50/70 border border-blue-200 rounded-3xl p-6 shadow-sm mt-6">
         <h4 class="text-[1.1rem] font-extrabold text-blue-900 mb-4 flex items-center gap-2"><span>💡</span> 부족분 보완 스마트 솔루션</h4>
         <div class="space-y-4 text-[0.95rem] text-blue-900">
           <p class="leading-relaxed">목표 세후 수령액 대비 현재 예상액이 <strong class="text-rose-600 text-lg">연 ${formatMoney(shortfall)} (월 약 ${formatMoney(monthlyShortfall)}) 부족</strong>합니다.</p>
           
           <div class="bg-white p-5 rounded-2xl shadow-sm">
             <p class="mb-4 text-slate-700 leading-relaxed">은퇴 후 20년간 부족분을 충당하려면 은퇴 시점에 <strong>약 ${formatMoney(requiredLumpSum)}</strong>의 목돈이 필요합니다.</p>
             <div class="flex justify-between items-center bg-blue-50 p-5 rounded-xl border border-blue-100">
               <span class="font-bold text-slate-800 leading-snug">남은 ${years}년 동안<br><span class="text-brand-600">매월 필요한 추가 저축액</span></span>
               <span class="text-2xl font-extrabold text-brand-600">${formatMoney(monthlySavings)}</span>
             </div>
             <p class="text-[0.75rem] text-slate-500 mt-4 leading-relaxed bg-slate-50 p-3 rounded-lg">
               ※ 예상 연수익률 ${yieldRate}% 가정.<br>
               ※ 저축성 보험의 10년 비과세, 연금저축/IRP 세액공제, ISA 등을 활용하여 세금 손실을 줄이면 이 저축액을 훨씬 낮출 수 있습니다. 우측 하단의 담당자에게 문의해보세요!
             </p>
           </div>
         </div>
       </div>
     `;
  } else {
     solutionHtml = `
       <div class="bg-emerald-50/70 border border-emerald-200 rounded-3xl p-6 shadow-sm mt-6">
         <h4 class="text-[1.1rem] font-extrabold text-emerald-900 flex items-center gap-2"><span>🎉</span> 안정적인 은퇴 준비 완료!</h4>
         <p class="text-emerald-800 mt-3 leading-relaxed">예상 세후 실수령액이 목표액을 <strong class="text-emerald-600 text-[1.05rem]">연 ${formatMoney(Math.abs(shortfall))}</strong> 초과 달성했습니다. 여유로운 은퇴 생활이 기대됩니다.</p>
       </div>
     `;
  }
  
  const res = document.getElementById('calcResult');
  res.classList.remove('hidden');
  res.innerHTML = `
    <div class="bg-purple-50/60 border border-purple-100 rounded-3xl p-6 shadow-sm">
      <h3 class="text-lg font-extrabold text-purple-900 border-b-2 border-purple-200 pb-3 mb-5">연금소득세 계산 요약</h3>
      
      <div class="space-y-3 mb-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col gap-1">
          <div class="text-[0.8rem] font-bold text-slate-500 uppercase tracking-wide">1. 비과세 연금</div>
          <div class="flex justify-between items-center"><span class="font-medium text-slate-700">수령액: ${formatMoney(taxFree)}</span> <span class="font-extrabold text-emerald-600">세금: 0원</span></div>
        </div>
        
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col gap-1">
          <div class="text-[0.8rem] font-bold text-slate-500 uppercase tracking-wide">2. 사적 연금</div>
          <div class="flex justify-between items-center"><span class="font-medium text-slate-700">수령액: ${formatMoney(priv)}</span> <span class="font-extrabold text-slate-800">소득세: ${formatMoney(privTax)}</span></div>
          <div class="text-[0.75rem] text-brand-500 font-medium mt-1">적용 방식: ${privRateStr}</div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col gap-1">
          <div class="text-[0.8rem] font-bold text-slate-500 uppercase tracking-wide">3. 공적 연금 (${pubType})</div>
          <div class="flex justify-between items-center"><span class="font-medium text-slate-700">수령액: ${formatMoney(pub)}</span> <span class="font-extrabold text-slate-800">소득세: ${formatMoney(pubTax)}</span></div>
          <div class="text-[0.75rem] text-brand-500 font-medium mt-1">공제 반영 후 과표: ${formatMoney(basePub)}</div>
        </div>
      </div>
      
      <div class="bg-purple-100/50 rounded-2xl p-5 flex flex-col gap-3 border border-purple-200">
        <div class="flex justify-between items-center text-[0.95rem]">
          <span class="font-bold text-slate-700">연간 총 수령액</span>
          <span class="font-extrabold text-slate-800 text-lg">${formatMoney(totalIncome)}</span>
        </div>
        <div class="flex justify-between items-center border-t border-purple-200/60 pt-3">
          <span class="font-bold text-slate-700">총 연금소득세 <span class="text-xs font-medium text-slate-500">(지방세 포함)</span></span>
          <span class="text-lg font-extrabold text-rose-600">- ${formatMoney(finalTax)}</span>
        </div>
        <div class="flex justify-between items-center border-t border-purple-200/60 pt-3 mt-1">
          <span class="font-extrabold text-slate-900">예상 세후 실수령액</span>
          <span class="text-2xl font-extrabold text-brand-600">${formatMoney(netIncome)}</span>
        </div>
      </div>
    </div>
    
    ${solutionHtml}
  `;
};
